name: Deploy Quartz site to GitHub Pages
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build Quartz
        run: |
          # Clone Quartz into a temp directory
          git clone https://github.com/jackyzha0/quartz.git ../quartz-builder
          cd ../quartz-builder
          npm ci
          
          # Move vault content into builder
          rm -rf content/*
          cp -r "$GITHUB_WORKSPACE"/* content/
          
          # Use our specific configs
          cp "$GITHUB_WORKSPACE"/quartz.config.ts .
          cp "$GITHUB_WORKSPACE"/quartz.layout.ts .
          
          # Build
          npx quartz build
          
          # Move output back to workspace
          mv public "$GITHUB_WORKSPACE"/public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
