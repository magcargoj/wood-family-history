name: Deploy Quartz site to GitHub Pages
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: vault

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build Quartz
        run: |
          # Clone Quartz in a separate directory to avoid recursion
          git clone https://github.com/jackyzha0/quartz.git quartz-builder
          cd quartz-builder
          npm ci
          
          # Clean default content and copy vault files
          rm -rf content/*
          cp -r ../vault/* content/
          
          # Remove git and workflow files from content to keep it clean
          rm -rf content/.git content/.github content/quartz-builder
          
          # Overwrite with custom configs from the vault
          if [ -f "../vault/quartz.config.ts" ]; then cp ../vault/quartz.config.ts quartz.config.ts; fi
          if [ -f "../vault/quartz.layout.ts" ]; then cp ../vault/quartz.layout.ts quartz.layout.ts; fi
          
          # Build the site
          npx quartz build
          
          # Move result to where the uploader expects it
          mv public ../public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
