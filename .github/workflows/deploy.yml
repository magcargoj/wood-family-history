name: Deploy Quartz site to GitHub Pages
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz
          ref: v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: ./quartz
        run: npm ci

      - name: Copy Vault to Quartz Content
        run: |
          mkdir -p quartz/content
          # Copy all markdown and source files to content
          rsync -av --exclude='quartz' --exclude='.git' --exclude='.github' --exclude='node_modules' ./ quartz/content/
          
          # Overwrite default Quartz config with our custom ones
          cp quartz.config.ts quartz/quartz.config.ts
          cp quartz.layout.ts quartz/quartz.layout.ts

      - name: Build Quartz
        working-directory: ./quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
