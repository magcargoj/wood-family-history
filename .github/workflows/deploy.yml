name: Deploy Quartz site to GitHub Pages
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Quartz
        run: |
          git clone https://github.com/jackyzha0/quartz.git __quartz
          cd __quartz
          git checkout v4
          npm ci

      - name: Prepare Content
        run: |
          mkdir -p __quartz/content
          # Copy all vault files to the content directory
          cp -r ./* __quartz/content/
          # Remove the quartz builder directory from the content to avoid recursion
          rm -rf __quartz/content/__quartz
          # Overwrite config files
          cp quartz.config.ts __quartz/quartz.config.ts
          cp quartz.layout.ts __quartz/quartz.layout.ts

      - name: Build Quartz
        run: |
          cd __quartz
          npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: __quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
