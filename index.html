<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wood Family History</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #2c3e50; }
    .sidebar-nav li a { font-size: 16px; font-weight: 500; }
    .markdown-section { max-width: 800px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Wood Family History',
      repo: 'https://github.com/magcargoj/wood-family-history',
      loadSidebar: true,
      auto2top: true,
      homepage: 'README.md',
      search: 'auto',
      relativeFiles: true,
      plugins: [
        function(hook, vm) {
          // Convert [[Wikilinks]] or [[Target|Label]] to [Label](Target.md)
          hook.beforeEach(function(content) {
            return content.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, function(match, target, label) {
              const display = label || target;
              const link = target.replace(/ /g, '_') + '.md';
              return `[${display}](${link})`;
            });
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Mermaid plugin -->
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
  <!-- svg-pan-zoom library -->
  <script src="//cdn.jsdelivr.net/npm/svg-pan-zoom@latest/dist/svg-pan-zoom.min.js"></script>
  <script>
    var config = {
      startOnLoad: true,
      flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'cardinal' },
      securityLevel: 'loose',
    };
    mermaid.initialize(config);

    // Logic to add zoom to mermaid diagrams after they render
    window.$docsify.plugins = [].concat(window.$docsify.plugins, function(hook, vm) {
      hook.doneEach(function() {
        const mermaids = document.querySelectorAll('.mermaid svg');
        mermaids.forEach(svg => {
          svg.style.width = '100%';
          svg.style.height = '100%';
          svgPanZoom(svg, {
            zoomEnabled: true,
            controlIconsEnabled: true,
            fit: true,
            center: true,
            minZoom: 0.1
          });
        });
      });
    });
  </script>
</body>
</html>
