<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wood Family History</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root { --theme-color: #2c3e50; }
    .sidebar-nav li a { font-size: 16px; font-weight: 500; }
    .markdown-section { max-width: 800px; margin: 0 auto; }
    .tree-container { width: 100%; height: 600px; overflow: hidden; border: 1px solid #eee; border-radius: 8px; background: #fdfdfd; cursor: grab; }
    .node circle { fill: #fff; stroke: #2c3e50; stroke-width: 2px; }
    .node text { font: 12px sans-serif; }
    .link { fill: none; stroke: #ccc; stroke-width: 1.5px; }
    .node--internal text { text-shadow: 0 1px 0 #fff, 0 -1px 0 #fff, 1px 0 0 #fff, -1px 0 0 #fff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Wood Family History',
      repo: 'https://github.com/magcargoj/wood-family-history',
      loadSidebar: true,
      auto2top: true,
      homepage: 'README.md',
      search: 'auto',
      relativeFiles: true,
      plugins: [
        function(hook, vm) {
          // Convert [[Wikilinks]] or [[Target|Label]] to [Label](Target.md)
          hook.beforeEach(function(content) {
            return content.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, function(match, target, label) {
              const display = label || target;
              const link = target.replace(/ /g, '_') + '.md';
              return `[${display}](${link})`;
            });
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
