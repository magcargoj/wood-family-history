<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wood Family History</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A digital archive of the Wood and Brooks family legacies.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Modern Material Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  
  <style>
    :root {
      /* Branding Colors */
      --theme-color: #2c3e50;
      --base-font-size: 16px;
      --content-max-width: 55em;
    }
    
    /* Elegant Typography */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Mobile Sidebar Fix */
    @media screen and (max-width: 768px) {
      .sidebar {
        padding-top: 20px;
      }
    }

    /* Card-like styling for lists */
    .markdown-section table {
      display: table;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .cover-main h1 small {
      font-size: 0.5em;
      display: block;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="app">Loading our history...</div>
  <script>
    window.$docsify = {
      name: 'Wood Family History',
      repo: 'https://github.com/magcargoj/wood-family-history',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: true,
      subMaxLevel: 2,
      auto2top: true,
      mergeNavbar: true,
      executeScript: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search for an ancestor...',
        noData: 'No results found.',
        depth: 6
      },
      // Better Wikilink Support for Docsify
      markdown: {
        renderer: {
          link: function(href, title, text) {
            if (href.startsWith('[[')) {
              const clean = href.replace('[[', '').replace(']]', '');
              const parts = clean.split('|');
              const target = parts[0].replace(/ /g, '_');
              const label = parts[1] || parts[0];
              return `<a href="#/${target}">${label}</a>`;
            }
            return this.origin.link.apply(this, arguments);
          }
        }
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
